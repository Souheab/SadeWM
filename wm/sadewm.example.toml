# sadewm runtime configuration
# Copy to ~/.config/sadewm/sadewm.toml and edit to taste.
# Any key that is omitted falls back to the compiled-in default from config.h.
# Launch with a custom path:  sadewm -c /path/to/sadewm.toml

# ---------------------------------------------------------------------------
# Appearance
# ---------------------------------------------------------------------------
[appearance]
# Width of the window border in pixels.
borderpx = 2

# Gap between tiled windows in pixels.
gappx = 10

# Snap-to-edge distance in pixels when moving/resizing floating windows.
snap = 32

# ---------------------------------------------------------------------------
# Colors
# All values are hex RGB strings in the form "#rrggbb".
# ---------------------------------------------------------------------------

# Normal (unfocused) windows
[colors.norm]
border = "#444444"  # window border

# Selected (focused) window
[colors.sel]
border = "#0099ff"  # window border

# ---------------------------------------------------------------------------
# Layout defaults
# These are the starting values; they can be adjusted at runtime with
# the usual keybindings and persist for the session.
# ---------------------------------------------------------------------------
[layout]
# Master area size as a fraction of the screen [0.05..0.95].
mfact = 0.5

# Number of clients in the master area.
nmaster = 1

# Reserve pixels at the top of each monitor (e.g. for a top bar).
topoffset = 0

# Reserve pixels at the bottom of each monitor (default leaves room for sgbar).
bottomoffset = 48

# Honour window size hints (min/max/increment) in tiled mode.  1 = yes, 0 = no.
resizehints = 1

# Keep focus locked on a fullscreen window until it exits fullscreen.  1 = yes.
lockfullscreen = 1

# ---------------------------------------------------------------------------
# Window rules
# Each [[rules]] entry maps a window to a tag mask, float state, and monitor.
# A rule matches when ALL non-empty fields match (substring match on class /
# instance / title).  Omit a field or leave it empty to match anything.
# If this section is present it REPLACES the compiled-in rules entirely.
# ---------------------------------------------------------------------------

# Float Gimp on any tag.
[[rules]]
class      = "Gimp"
isfloating = true

# Send Discord to tag 9 (bit 8 = 1 << 8 = 256).
[[rules]]
class     = "discord"
tags_mask = 256
monitor   = -1  # -1 means "any monitor"

# ---------------------------------------------------------------------------
# Keybindings
# Each [[keys]] entry overrides or adds a keybinding.  Keybindings are
# MERGED on top of the compiled-in defaults — you only need to list
# keys you want to change, add, or remove.
#
# Fields:
#   mod       — array of modifier names: "super", "alt", "shift", "control"/"ctrl"
#   key       — X11 keysym name (without XK_ prefix): "h", "Return", "space", "1"
#   action    — function name: "spawn", "focusleft", "killclient", "view", etc.
#               Use "none" to unbind a compiled-in key.
#   cmd       — (spawn only) shell command string
#   layout    — (setlayout only) "tile" or "float"
#   arg_int   — integer argument (e.g. focusstack direction +1/-1)
#   arg_uint  — unsigned int argument (e.g. tag mask)
#   arg_float — float argument (e.g. setmfact delta)
# ---------------------------------------------------------------------------

# Example: launch dmenu instead of rofi
# [[keys]]
# mod    = ["super"]
# key    = "p"
# action = "spawn"
# cmd    = "dmenu_run"

# Example: unbind Super+q (killclient)
# [[keys]]
# mod    = ["super"]
# key    = "q"
# action = "none"

# Example: override mfact step to 0.1
# [[keys]]
# mod       = ["super", "control"]
# key       = "h"
# action    = "setmfact"
# arg_float = -0.1

# ---------------------------------------------------------------------------
# Tag keybindings (shorthand)
# Each [[tagkeys]] entry generates the four standard bindings for one tag:
#   Super+key         → view tag
#   Super+Ctrl+key    → toggleview tag
#   Super+Shift+key   → tag (move window to tag)
#   Super+Ctrl+Shift  → toggletag
# The "tag" field is the 0-based tag index (0–8).
# ---------------------------------------------------------------------------

# Example: bind F1–F9 to tags 1–9 instead of number keys
# [[tagkeys]]
# key = "F1"
# tag = 0
#
# [[tagkeys]]
# key = "F2"
# tag = 1
